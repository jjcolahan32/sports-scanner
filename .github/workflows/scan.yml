name: card-scanner
# Runs every 2 hours, all day (UTC). Covers the MLB slate from midday ET onward.
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch: {}          # lets you trigger a manual run from the Actions tab

permissions:
  contents: write                # allow committing state.json back for dedupe

jobs:
  scan:
    runs-on: ubuntu-latest
    concurrency: card-scanner    # never overlap runs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run scan
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          NTFY_TOPIC:   ${{ secrets.NTFY_TOPIC }}
          LEAD_HOURS:   "4"
        run: python scan.py
      - name: Persist dedupe + opening-line state
        run: |
          git config user.name  "card-scanner"
          git config user.email "bot@users.noreply.github.com"
          git add state.json opens.json card_*.json || true
          git commit -m "state: $(date -u +%F_%H:%M)" || echo "no change"
          git push || echo "nothing to push"
