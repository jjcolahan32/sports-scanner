name: card-scanner
# Fires hourly; scan.py's own DST-aware market_hours_open() check (zoneinfo,
# America/New_York) decides whether to actually do anything -- active
# checkpoints are 11am/1/3/5/7/9pm ET, every 2h. Firing hourly in UTC and
# gating in Python means the intended ET schedule survives DST changes
# automatically; a fixed UTC cron would silently drift by an hour each time
# clocks change. Manual dispatch always runs regardless of the hour.
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}          # lets you trigger a manual run from the Actions tab

permissions:
  contents: write                # allow committing state.json back for dedupe

jobs:
  scan:
    runs-on: ubuntu-latest
    concurrency: card-scanner    # never overlap runs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run scan
        env:
          ODDS_API_KEY:       ${{ secrets.ODDS_API_KEY }}
          NTFY_TOPIC:         ${{ secrets.NTFY_TOPIC }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LEAD_HOURS:   "4"
        run: python scan.py
      - name: Render dashboard
        run: python render_dashboard.py
      - name: Persist dedupe + opening-line state + dashboard
        run: |
          git config user.name  "card-scanner"
          git config user.email "bot@users.noreply.github.com"
          git add state.json opens.json card_*.json discord_sent.json docs/index.html || true
          git commit -m "state: $(date -u +%F_%H:%M)" || echo "no change"
          # Retry with rebase on push rejection -- another job (or a manual
          # push) landing first must never cause this run's data to be
          # silently dropped by a bare "push || echo nothing to push".
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push rejected, rebasing onto latest main (attempt $i)"
            git fetch origin main
            git rebase origin/main || { echo "rebase conflict -- leaving for manual resolution"; exit 1; }
          done
