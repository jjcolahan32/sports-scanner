name: totals-scanner
# Fires hourly; scan_totals.py's own DST-aware market_hours_open() check
# decides whether to actually do anything -- same 11am/1/3/5/7/9pm ET
# checkpoints as card-scanner, now that quota allows it (6 checks/day for
# each market = 360/month combined, comfortably under the 500 free cap).
# Firing hourly in UTC and gating in Python means the schedule survives DST
# changes automatically. Manual dispatch always runs regardless of the hour.
#
# Runs at :17 past the hour (staggered from card-scanner's :07 and
# nightly-grader's :27) -- avoids the top-of-hour GitHub Actions scheduling
# congestion (see card-scanner's scan.yml comment) and keeps our own three
# workflows from landing in the same minute.
on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan_totals:
    runs-on: ubuntu-latest
    concurrency: totals-scanner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run totals scan
        env:
          ODDS_API_KEY:       ${{ secrets.ODDS_API_KEY }}
          NTFY_TOPIC:         ${{ secrets.NTFY_TOPIC }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scan_totals.py
      - name: Render dashboard
        run: python render_dashboard.py
      - name: Persist dedupe state + dashboard
        run: |
          git config user.name  "totals-scanner"
          git config user.email "bot@users.noreply.github.com"
          git add state_totals.json card_totals_*.json discord_sent.json last_totals.json docs/index.html docs/history.html || true
          git commit -m "totals state: $(date -u +%F_%H:%M)" || echo "no change"
          # Retry with rebase on push rejection -- another job (or a manual
          # push) landing first must never cause this run's data to be
          # silently dropped by a bare "push || echo nothing to push".
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push rejected, rebasing onto latest main (attempt $i)"
            git fetch origin main
            git rebase origin/main || { echo "rebase conflict -- leaving for manual resolution"; exit 1; }
          done
