name: nightly-grader
# Runs once nightly at 08:00 UTC (~04:00 ET) — after all games, incl. West Coast, are Final.
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  grade:
    runs-on: ubuntu-latest
    concurrency: nightly-grader
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Grade the day
        env:
          NTFY_TOPIC:         ${{ secrets.NTFY_TOPIC }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python grade.py
      - name: Render dashboard
        run: python render_dashboard.py
      - name: Persist card + ledger + dashboard
        run: |
          git config user.name  "nightly-grader"
          git config user.email "bot@users.noreply.github.com"
          git add card_*.json ledger.json docs/index.html || true
          git commit -m "grade: $(date -u +%F)" || echo "no change"
          # Retry with rebase on push rejection -- another job (or a manual
          # push) landing first must never cause this run's data to be
          # silently dropped by a bare "push || echo nothing to push".
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push rejected, rebasing onto latest main (attempt $i)"
            git fetch origin main
            git rebase origin/main || { echo "rebase conflict -- leaving for manual resolution"; exit 1; }
          done
