name: nightly-grader
# Fires hourly; grade.py's own DST-aware grade_hours_open() check decides
# whether to actually do anything -- checkpoints are 6pm/8pm/10pm/12am/2am/4am
# ET, every 2h, so a card finalizes at or before the last two checks after
# any given game goes Final (extra innings/rain delays included). Firing
# hourly in UTC and gating in Python means the schedule survives DST changes
# automatically. Manual dispatch always runs regardless of the hour.
#
# Runs at :27 past the hour (staggered from card-scanner's :07 and
# totals-scanner's :17) -- avoids the top-of-hour GitHub Actions scheduling
# congestion (see card-scanner's scan.yml comment) and keeps our own three
# workflows from landing in the same minute.
on:
  schedule:
    - cron: "27 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  grade:
    runs-on: ubuntu-latest
    concurrency: nightly-grader
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Grade the day
        env:
          NTFY_TOPIC:         ${{ secrets.NTFY_TOPIC }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python grade.py
      - name: Render dashboard
        run: python render_dashboard.py
      - name: Persist card + ledger + dashboard
        run: |
          git config user.name  "nightly-grader"
          git config user.email "bot@users.noreply.github.com"
          git add card_*.json ledger.json docs/index.html || true
          git commit -m "grade: $(date -u +%F)" || echo "no change"
          # Retry with rebase on push rejection -- another job (or a manual
          # push) landing first must never cause this run's data to be
          # silently dropped by a bare "push || echo nothing to push".
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push rejected, rebasing onto latest main (attempt $i)"
            git fetch origin main
            git rebase origin/main || { echo "rebase conflict -- leaving for manual resolution"; exit 1; }
          done
